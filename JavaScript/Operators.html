<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //1. Arithmatic OPerators +,-,*,/,%
        var a = 10
        var b = 7
        
        console.log(a+b) //17
        console.log(a-b) //3
        console.log(a*b) //70
        console.log(a/b) //1.something
        console.log(a%b) //3


        //2. Assignment - Assign value : ""=""
        var x = 10 //value 10 has been assigned to variable x

        console.log(x+=5)
        console.log(x-=3)

        
        //3. Comparsion
        var p = 25
        var q = 20

        console.log(p>q); //25 > 20 - true
        console.log(p<q); //25 < 20 - false
        console.log(p>=q)
        console.log(p<=q)

        const height1 ='170'
        const height2 = 170

        // == Only checks the value
        console.log(height1 == height2) //true

        // === Checks values & datatype also
        console.log(height1 === height2)  

        //Logical Operators- AND, OR, Negation

        var isMember = true
        let TotalPrice = 300

        //AND - && : othe the condition is true then output is true
        console.log( isMember && TotalPrice > 500 )

        
        //OR - || : If only 1 condition is true then also output is true
        console.log( isMember || TotalPrice > 500 )


        //Negation : Opposite value
        let netflixSubs = false

        console.log(netflixSubs)
    </script>
</body>
</html>
