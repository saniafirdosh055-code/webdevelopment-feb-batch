<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //switch - Changing through different case 

        //Vending Machine

        let choice = 6

        switch(choice){
            //Different case
        
           case 1:
                console.log("Chips")
                break;
           case 2:
                console.log("Coffee")
                break;
           case 3:
                console.log("Chocolates")
                break;
           case 4:
                console.log("Ice-Cream")
                break;
           case 5:
                console.log("Cookies")
                break;
           case 6:
                console.log("Cold Drink")  
                break;
           case 7:
                console.log("Pastry")
                break;

            default:
                console.log("Invalid Choice")
        }
    </script>
</body>
</html>
