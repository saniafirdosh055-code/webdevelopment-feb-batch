<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color:blue;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
        }
        p.ex1{
            display: none;
        }
        p.ex2{
            display: block;
            background-color: lightcoral;
        }
        p.ex3{
            display: inline;
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h2>Display Properties Example</h2>

    <h1>Display None</h1>
    <div>
        Here the Function disabled as none
        <p class="ex1">Hello Disply None</p>
    </div>

    <h1>Display Block</h1>
    <div>
        Act like Div Container - 100% space or width
        <p class="ex2">Hello Disply Block</p>
    </div>
    <h1>Display Inline</h1>
    <div>
        Act like San tag only required amount of space
        <p class="ex3">Hello Disply Inline</p>
    </div>
</body>
</html>
