    <script>
    //Data Types in JavaScript

    //1.String - Text "Text" or 'String' - sequence of characters
    var username = "mike"

    var password = "mike@123"

    console.log(typeof(username))
    console.log(typeof(passwaord))

    //2. Number - +ve, -ve, Decimal Number

    var age =36
    var temp=11.11
    var cyz= -12
    console.log(typeof(age))
    console.log(typeof(temp))
    console.log(typeof(xyz))

    //3. Boolean - true or false value can store
    var isLoggedin = false 
    var isVerified = true

    console.log(typeof(isloggedin))

    //4.Undefined - value not assigned
    let deliveryFee

    console.log(typeof(deliveryFee))

    var abc = null
    console.log(typeof(abc))

    var distnaceofeahjdgtu = 46769035258n

    //Array - To store multiple data at the same time of different data types as well
    //symbol - [] Square bracket
    //Rule : Index no start with 0
    
    var fruits = [ "mango", "orange", "apple", 105, 101, true, "watermelon", "a", "12", 14, "hello" ]
    console.log(fruits)

    //Access the data
    console.log(fruits[2])
    console.log(fruits[4])

    //length = Total no of Data in Array
    console.log(fruits.length)

    // console.log(fruits[-1]) js doesnot support negetive index

    var Employee = {
        //key:value

    }
    console.log(name)

    //Syntax : function(keyword) functionName(){    }

        //Body of Function - Instruction to perform Task
