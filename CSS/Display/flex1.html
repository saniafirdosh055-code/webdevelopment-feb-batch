<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            display: flex;
            gap: 50px;
            /*flex by default is row but we can change it to column by flex-direction: column;*/

            justify-content: end;
            align-items: center;

            background-color: violet;
            padding: 20px;
        }
      .box{
        border: 1px solid black;
        width: 100px;
        height: 100px;
        border-radius: 10px;
        padding: 10px;
        font-weight: bold;
        font-style: italic;
        background-color: rgb(120, 236, 238);
        box-shadow: 0 0 12px black;
      }
   </style>
</head>
<body>
    <!--Flex display in 1 dimensional - Row or Column-->
    <div class="product">

        <div class="box">Cake .</div>
        <div class="box">Cookies .</div>
        <div class="box">Pastry  .</div> 

    </div> 
</body>
</html>
