<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Date - provides information about time , day, mnt, yr.....
        //syntax - new Date()

        let abc = new Date()

        console.log(abc.getDate())
        console.log(abc.getFullYear())
        console.log(abc.getHours()) //24 hrs format
        console.log(abc.getMonth()) //jan starts with 0
        console.log(abc.getDay()) //Monday starts with 1 //output in form of number
        console.log(abc.getMinutes())

        
    </script>
</body>
</html>
